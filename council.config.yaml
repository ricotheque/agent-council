# Agent Council Configuration
# Add or remove council members as needed.
# Note: the installer filters members to detected CLIs only on initial generation.
# After that, missing CLIs are not auto-removed and will report `missing_cli` at runtime.

council:
  # Council members configuration
  # Each member needs:
  #   - name: identifier for the agent
  #   - command: CLI command to execute (prompt is passed via stdin)
  #   - emoji: display emoji (optional)
  #   - color: ANSI color (RED, GREEN, BLUE, YELLOW, CYAN)

  members:
    - name: claude
      command: "claude -p --output-format text --model sonnet"
      code_command: "claude --dangerously-skip-permissions -p --output-format text --model sonnet"
      emoji: "🧠"
      color: "CYAN"

    - name: codex
      command: "codex exec --skip-git-repo-check"
      code_command: "codex exec --full-auto --skip-git-repo-check"
      emoji: "🤖"
      color: "BLUE"

    - name: gemini
      # Prompts are passed via stdin; -p with placeholder keeps headless mode
      command: "gemini -p . -m gemini-2.5-flash"
      code_command: "gemini -p . -m gemini-2.5-flash --yolo"
      emoji: "💎"
      color: "GREEN"

  # Chairman configuration (Claude will act as chairman)
  chairman:
    # role: random|auto|claude|codex|gemini|...
    # - random: pick a random member each session (all models participate as peers)
    # - auto: infer from host tool (Claude Code => claude, Codex CLI => codex)
    role: "random"
    description: "Synthesizes all opinions and provides final recommendation"
    # Optional: run synthesis inside council.sh via CLI (otherwise the host agent synthesizes)
    # command: "codex exec"

  # Execution settings
  settings:
    mode: review            # 'review' (text responses) | 'code' (worktree implementations)
    timeout: 600            # Timeout seconds per agent in review mode (0 to disable)
    code_timeout: 600       # Timeout seconds per agent in code mode (agents need more time to explore + implement)
    exclude_chairman_from_members: false  # All models participate as peers
    # synthesize: true       # Force Stage 3 synthesis inside council.sh (requires chairman.command or --chairman codex/gemini)

    # Adversarial review: after Round 1 responses, each agent critiques the others
    adversarial_review: true
    critique_timeout: 600   # Timeout for the critique round (defaults to timeout if omitted)
    critique_include_self: false  # Whether agents see their own Round 1 response in the critique
    cleanup_worktrees: true      # Auto-remove worktrees on clean (code mode)
    keep_worktrees_on_error: false  # Keep worktrees for inspection if agent errors
